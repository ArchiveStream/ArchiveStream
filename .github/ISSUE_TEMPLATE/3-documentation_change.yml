name: 📑 Documentation improvement
description: Submit an idea or correction for the Wiki documentation
title: "Documentation: ..."
labels: 'touches: docs'
type: 'Enhancement'
assignees:
  - pirate
body:
  - type: markdown
    attributes:
      value: |
        If you prefer, you can submit a [Pull Request](https://github.com/ArchiveStream/docs) on https://github.com/ArchiveStream/docs to edit the docs directly instead.

  - type: input
    id: page_url
    validations:
      required: true
    attributes:
      label: "What is the URL of the page you'd like to see improved?"
      placeholder: e.g. https://github.com/ArchiveStream/docs/wiki/Install

  - type: input
    id: section_title
    validations:
      required: true
    attributes:
      label: "What is the title of the relevant section?"
      placeholder: e.g. Option B. Automatic Setup Script

  - type: textarea
    id: suggested_edit
    attributes:
      label: "What is the suggested edit?"
      placeholder: |
        e.g. Please document how to run the automatic setup script for ArchiveStream on TempleOS.  
        Attach images, screenshots, code snippets, etc. anything you think would help.
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
          
        We strive to address issues as quickly as possible, it usually takes us *about a ~week* to respond.  
          
        In the meantime please consider:  
          
          - 💰 [Donating to support ArchiveStream open-source](https://github.com/ArchiveStream/ArchiveStream/wiki/Donations)
          - 👨‍✈️ [Hiring us for corporate deployments](https://docs.monadical.com/s/archivestream-consulting-services) with professional support, custom feature development, and help with CAPTCHAs/rate-limits
          - 🔍 [Checking out the new ReadTheDocs Documentation](https://docs.archivestream.github.io/)
          - ✨ Helping us test a newer [`BETA` release](https://github.com/ArchiveStream/ArchiveStream/releases)
